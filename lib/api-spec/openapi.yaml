          type: string
        entityType:
          type: string
          nullable: true
        entityId:
          type: integer
          nullable: true
        oldValue:
          type: string
          nullable: true
        newValue:
          type: string
          nullable: true
        ipAddress:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    PaginatedAuditLogs:
      type: object
