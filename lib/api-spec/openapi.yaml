      properties:
        generatedAt:
          type: string
          format: date-time
        complianceRate:
          type: number
          format: float
        totalDevices:
          type: integer
        approvedDevices:
          type: integer
        pendingDevices:
          type: integer
        quarantinedDevices:
          type: integer
        rejectedDevices:
          type: integer
        unsyncedApproved:
          type: integer

    User:
      type: object
      required: [id, username, email, role]
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [super_admin, network_admin, helpdesk, auditor, read_only]
        fullName:
          type: string
          nullable: true
        lastLoginAt:
          type: string
          format: date-time
          nullable: true
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time

    CreateUserRequest:
      type: object
      required: [username, email, password, role]
      properties:
        username:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [super_admin, network_admin, helpdesk, auditor, read_only]
        fullName:
          type: string

    UpdateUserRequest:
      type: object
      properties:
        email:
          type: string
        role:
          type: string
          enum: [super_admin, network_admin, helpdesk, auditor, read_only]
        fullName:
          type: string
        active:
          type: boolean

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    CiscoConfigRequest:
      type: object
      required: [radiusServerIp, radiusSecret]
      properties:
        radiusServerIp:
          type: string
        radiusSecret:
          type: string
        radiusAuthPort:
          type: integer
        radiusAcctPort:
          type: integer
        guestVlanId:
          type: integer
        quarantineVlanId:
          type: integer
        reauthTimer:
          type: integer
        enableDot1x:
          type: boolean
        enableMab:
          type: boolean
        interfaces:
          type: array
          items:
            type: string

    CiscoConfigResponse:
      type: object
      required: [config]
      properties:
        config:
          type: string
        warnings:
          type: array
          items:
            type: string
