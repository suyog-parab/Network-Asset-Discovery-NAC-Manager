      properties:
        generatedAt:
          type: string
          format: date-time
        totalDevices:
          type: integer
        byStatus:
          type: array
          items:
            $ref: "#/components/schemas/GroupCount"
        byVlan:
          type: array
          items:
            $ref: "#/components/schemas/GroupCount"
        bySite:
          type: array
          items:
            $ref: "#/components/schemas/GroupCount"
        byVendor:
          type: array
          items:
            $ref: "#/components/schemas/GroupCount"

    ComplianceReport:
      type: object
